services:
  php:
    # Local development service with PCOV for coverage
    build:
      context: .
      dockerfile: Dockerfile
      target: develop
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
    volumes:
      - .:/app/
    command: /bin/sh -c "while sleep 1000; do :; done"
  actions-tester:
    # CI testing service (no volume mounted - uses files baked into image at build time)
    # In CI: uses pre-built wordpress-client:latest image
    # Locally: builds from Dockerfile builder target
    image: wordpress-client:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
    command: /bin/sh -c "while sleep 1000; do :; done"
